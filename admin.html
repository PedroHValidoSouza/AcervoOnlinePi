<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Administração</title>
         <link rel="stylesheet" href="css/admin.css">

     </head>
<body>

    <header class="admin-header">
        <h1>Painel de Controle</h1>
        <div class="user-info">Olá, Administrador | <a href="index.html" style="color: #fab1a0; text-decoration: none;">Sair</a></div>
    </header>
        <div class="container">
    <h2>Painel Administrativo</h2>
    
    <div class="admin-card">
        <h3>Inserir Novo Livro</h3>
        
        <form id="bookForm">
            <div class="form-group">
                <label for="title">Título do Livro</label>
                <input type="text" id="title" placeholder="Ex: O Senhor dos Anéis" required>
            </div>

            <div class="form-group">
                <label for="author">Autor</label>
                <input type="text" id="author" placeholder="Ex: J.R.R. Tolkien" required>
            </div>

            <div class="form-group">
                <label for="releaseDate">Data de Lançamento</label>
                <input type="date" id="releaseDate" required>
            </div>

            <button type="submit">Salvar Livro</button>
        </form>
    </div>

    <div class="search-section">
        <h3>Livros Registrados</h3>
        <div id="bookList">
            </div>
    </div>
</div>

</body>
</html>
